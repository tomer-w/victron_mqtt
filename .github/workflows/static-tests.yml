name: Static Tests

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:
        inputs:
          logLevel:
            description: 'Log level'
            required: true
            default: 'warning'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install tools
        run: pip install hatch "virtualenv<20.29" ruff
      - name: Run ruff
        run: ruff check .
      - name: Run pylint (package + examples)
        run: hatch run lint:pylint
      - name: Run mypy (package only)
        run: hatch run types:check victron_mqtt
      - name: Run pyright (package + tests)
        run: hatch run types:pyright

  generated_files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install library
        run: pip install -e .
      - name: Regenerate victron_mqtt.json
        run: python -m victron_mqtt.utils.dump_victron_mqtt victron_mqtt.json
      - name: Fail if victron_mqtt.json is out of date
        run: |
          if ! git diff --quiet victron_mqtt.json; then
            echo "::error file=victron_mqtt.json::victron_mqtt.json is out of date. Run the 'dump-victron-mqtt' pre-commit hook (or: python -m victron_mqtt.utils.dump_victron_mqtt victron_mqtt.json) and commit the result."
            git --no-pager diff victron_mqtt.json
            exit 1
          fi
          echo "victron_mqtt.json is up to date."

  static_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install Hatch
        run: pip install hatch "virtualenv<20.29"
      - name: Run static tests
        id: tests
        shell: bash
        run: |
          EXIT_CODE=0
          hatch run test:pytest tests/static_test.py tests/static_hub_test.py tests/parsed_topics_test.py tests/test_unwrappers.py --cov=victron_mqtt --tb=no --no-header 2>&1 | tee /tmp/test_output.txt || EXIT_CODE=${PIPESTATUS[0]}
          OUTPUT=$(cat /tmp/test_output.txt)
          SUMMARY=$(echo "$OUTPUT" | sed -n '/short test summary info/,$ p')
          if [ -z "$SUMMARY" ]; then
            SUMMARY=$(echo "$OUTPUT" | tail -1)
          fi
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          {
            echo "summary<<EOF"
            echo "$SUMMARY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Save test results
        if: always() && github.event_name == 'pull_request'
        shell: bash
        env:
          TEST_EXIT_CODE: ${{ steps.tests.outputs.exit_code }}
          TEST_SUMMARY: ${{ steps.tests.outputs.summary }}
        run: |
          mkdir -p ./test-results
          echo "${{ github.event.number }}" > ./test-results/pr_number
          echo "$TEST_EXIT_CODE" > ./test-results/exit_code
          echo "$TEST_SUMMARY" > ./test-results/summary
      - name: Upload test results
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results/
      - name: Fail if tests failed
        if: steps.tests.outputs.exit_code != '0'
        run: exit 1
