name: Post Static Tests Results

on:
  workflow_run:
    workflows: ["Static Tests"]
    types:
      - completed

permissions:
  issues: write
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion != 'cancelled'
    steps:
      - name: Download test results
        uses: actions/github-script@v9
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }},
            });
            const matchArtifact = artifacts.data.artifacts.find(a => a.name === 'test-results');
            if (!matchArtifact) {
              core.setFailed('No test-results artifact found');
              return;
            }
            const download = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: matchArtifact.id,
              archive_format: 'zip',
            });
            const fs = require('fs');
            fs.writeFileSync('${{ github.workspace }}/test-results.zip', Buffer.from(download.data));
      - name: Extract test results
        run: |
          mkdir -p test-results
          unzip -o test-results.zip -d test-results
      - name: Post test summary to PR
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const prNumber = parseInt(fs.readFileSync('test-results/pr_number', 'utf8').trim(), 10);
            if (isNaN(prNumber)) {
              core.setFailed('Invalid PR number in artifact');
              return;
            }
            const exitCode = fs.readFileSync('test-results/exit_code', 'utf8').trim();
            const summary = fs.readFileSync('test-results/summary', 'utf8').trim();
            const icon = exitCode === '0' ? '✅' : '❌';
            const status = exitCode === '0' ? 'passed' : 'failed';
            const body = `## ${icon} Static Tests ${status}\n\n\`\`\`\n${summary}\n\`\`\``;

            // Delete previous bot comments for this workflow
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            for (const comment of comments) {
              if (comment.user.type === 'Bot' && comment.body.includes('Static Tests')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
