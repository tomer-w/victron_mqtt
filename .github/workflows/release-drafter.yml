name: Draft Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  draft_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install library
        run: pip install -e .

      - name: Get version from pyproject.toml
        id: version
        run: |
          version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Find previous release tag
        id: prev_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prev=$(gh release list --json tagName,isDraft -q '[.[] | select(.isDraft | not)] | .[0].tagName')
          echo "Previous release tag: $prev"
          echo "tag=$prev" >> $GITHUB_OUTPUT

      - name: Detect breaking changes
        id: breaking
        run: |
          prev_tag="${{ steps.prev_tag.outputs.tag }}"
          if [ -z "$prev_tag" ]; then
            echo "No previous release found, skipping breaking change detection"
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Extract old victron_mqtt.json from previous tag
          git show "${prev_tag}:victron_mqtt.json" > old.json 2>/dev/null || true
          if [ ! -f old.json ] || [ ! -s old.json ]; then
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          set +e
          breaking_output=$(python -m victron_mqtt.utils.detect_breaking_changes old.json victron_mqtt.json 2>/dev/null)
          exit_code=$?
          set -e

          rm -f old.json

          if [ $exit_code -eq 1 ] && [ -n "$breaking_output" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "content<<EOF" >> $GITHUB_OUTPUT
            echo "$breaking_output" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          existing=$(gh release list --json tagName,isDraft -q ".[] | select(.tagName == \"$tag\" and .isDraft) | .tagName")
          if [ -n "$existing" ]; then
            gh release edit "$tag" --draft --generate-notes
          else
            gh release create "$tag" --draft --generate-notes --title "$tag"
          fi

      - name: Prepend breaking changes to release notes
        if: steps.breaking.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          current_body=$(gh release view "$tag" --json body -q .body)

          breaking_section="${{ steps.breaking.outputs.content }}"
          new_body="${breaking_section}

          ${current_body}"

          gh release edit "$tag" --notes "$new_body"
