name: Build and Publish to PyPI and Github Pages

on:
  release:
    types: [published]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC
      contents: write
      pages: write
    environment:
      name: pypi
      # OPTIONAL: uncomment and update to include your PyPI project URL in the deployment status:
      url: https://pypi.org/project/victron_mqtt/
      #
      # ALTERNATIVE: if your GitHub Release name is the PyPI project version string
      # ALTERNATIVE: exactly, uncomment the following line instead:
      # url: https://pypi.org/project/YOURPROJECT/${{ github.event.release.name }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.target_commitish }}
          fetch-depth: 0

      - name: Sync version and update changelog from release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          TARGET_BRANCH="${{ github.event.release.target_commitish }}"

          # Update version in pyproject.toml if needed
          CURRENT=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          if [ "$VERSION" != "$CURRENT" ]; then
            echo "Updating version: $CURRENT → $VERSION"
            sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
          else
            echo "Version is already $VERSION, no change needed."
          fi

          # Prepend release notes to CHANGELOG.md
          RELEASE_BODY=$(gh release view "$TAG" --json body -q .body)
          RELEASE_DATE=$(gh release view "$TAG" --json publishedAt -q .publishedAt | cut -dT -f1)

          if [ -n "$RELEASE_BODY" ]; then
            # Downgrade ## to ### so sub-headers nest under the version heading
            RELEASE_BODY=$(echo "$RELEASE_BODY" | sed 's/^## /### /')
            ENTRY="## ${VERSION} (${RELEASE_DATE})"$'\n\n'"${RELEASE_BODY}"$'\n\n'
            if [ -f CHANGELOG.md ]; then
              # Prepend after the title line (# Changelog)
              if head -1 CHANGELOG.md | grep -q "^# "; then
                HEADER=$(head -1 CHANGELOG.md)
                TAIL=$(tail -n +2 CHANGELOG.md)
                printf '%s\n\n%s%s\n' "$HEADER" "$ENTRY" "$TAIL" > CHANGELOG.md
              else
                printf '%s%s' "$ENTRY" "$(cat CHANGELOG.md)" > CHANGELOG.md
              fi
            else
              printf '# Changelog\n\n%s' "$ENTRY" > CHANGELOG.md
            fi
          fi

          # Commit and push if anything changed
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: bump version to $VERSION [skip ci]"
            git push origin HEAD:"$TARGET_BRANCH"
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install hatch

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      
      - name: Run test_topics test
        run: |
          python -m pip install pytest pytest-asyncio
          python -m pytest tests/static_test.py -v
      
      - name: Generate victron_mqtt.json
        run: python -m victron_mqtt.utils.dump_victron_mqtt victron_mqtt.json

      - name: Build distribution
        run: hatch build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Copy victron_mqtt.json to docs/_data
        run: |
          mkdir -p docs/_data
          cp victron_mqtt.json docs/_data/victron_mqtt.json
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

